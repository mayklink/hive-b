appId: com.octob.app
productName: Octob
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - resources/**/*

# Native .node binaries cannot be loaded from inside an ASAR archive.
# This extracts them to app.asar.unpacked/ at build time.
asarUnpack:
  - '**/*.node'
  - '**/better-sqlite3/**'
  - '**/node-pty/**'

# ── macOS ──────────────────────────────────────────────
mac:
  icon: resources/icon.icns
  # Keep DMG/ZIP names aligned with release scripts and Homebrew download patterns
  artifactName: "Octob-${version}-${arch}.${ext}"
  extraResources:
    - from: src/native/build/Release/ghostty.node
      to: native/ghostty.node
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.inherit.plist
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  notarize: true

dmg:
  sign: false

# ── Windows ────────────────────────────────────────────
win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  artifactName: "Octob-Setup-${version}.${ext}"

# ── Linux ──────────────────────────────────────────────
linux:
  icon: resources/icon.png
  category: Development
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: tar.gz
      arch:
        - x64

deb:
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libuuid1

# ── Auto-update ───────────────────────────────────────
publish:
  - provider: github
    owner: morapelker
    repo: octob
