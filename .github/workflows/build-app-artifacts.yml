# Full app packaging: electron-vite build + electron-builder (no GitHub Release publish).
# Use this to download installers/zips from the Actions run summary → Artifacts.
name: Build app (artifacts)

on:
  workflow_dispatch:
    inputs:
      include_mac_unsigned:
        description: 'macOS unsigned build (needs gh release ghostty-deps-v1 in this repo)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: v
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

  build-windows:
    name: Windows (NSIS + zip)
    needs: meta
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: yarn install:ci

      - run: yarn build

      - name: Package (Windows)
        run: yarn electron-builder --win --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Verify Windows outputs
        shell: bash
        run: |
          set -euo pipefail
          ls -la dist/
          find dist -maxdepth 1 -name 'Octob-Setup-*.exe' | grep .
          find dist -maxdepth 1 -name '*.zip' | grep .
          echo "OK: installer and zip present"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Octob-windows-v${{ needs.meta.outputs.version }}
          path: dist/
          if-no-files-found: error

  build-linux:
    name: Linux (AppImage + deb + tar.gz)
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: yarn install:ci

      - run: yarn build

      - name: Package (Linux)
        run: yarn electron-builder --linux --publish never

      - name: Verify Linux outputs
        shell: bash
        run: |
          set -euo pipefail
          ls -la dist/
          test "$(find dist -maxdepth 1 -name '*.AppImage' | head -1)" != "" || test "$(find dist -maxdepth 1 -name '*.deb' | head -1)" != ""
          echo "OK: Linux package(s) present"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Octob-linux-v${{ needs.meta.outputs.version }}
          path: dist/
          if-no-files-found: error

  build-mac-unsigned:
    name: macOS unsigned (dmg + zip)
    needs: meta
    if: ${{ inputs.include_mac_unsigned }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Download libghostty
        run: |
          mkdir -p vendor
          gh release download ghostty-deps-v1 -p libghostty.a -D vendor/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: pip3 install --break-system-packages setuptools

      - run: yarn install:ci

      - name: Build Ghostty native addon
        run: yarn build:native
        env:
          GHOSTTY_LIB_PATH: ${{ github.workspace }}/vendor/libghostty.a

      - run: yarn build
        env:
          GHOSTTY_LIB_PATH: ${{ github.workspace }}/vendor/libghostty.a

      - name: Package (macOS, unsigned, no notarize)
        run: yarn electron-builder --mac --publish never -c.mac.notarize=false
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Verify macOS outputs
        shell: bash
        run: |
          set -euo pipefail
          ls -la dist/
          test "$(find dist -maxdepth 1 \( -name '*.dmg' -o -name '*.zip' \) | head -1)" != ""
          echo "OK: macOS archive present"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Octob-macos-unsigned-v${{ needs.meta.outputs.version }}
          path: dist/
          if-no-files-found: error
